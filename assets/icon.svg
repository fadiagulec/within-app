<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- SOMA app icon — earth-grounded warm palette -->
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3F4D45"/>
      <stop offset="100%" stop-color="#2D3833"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9BA82"/>
      <stop offset="100%" stop-color="#8A7550"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square warm earth -->
  <rect width="1024" height="1024" rx="220" fill="url(#g)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#gold)" stroke-width="3" stroke-opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="url(#gold)" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Vesica piscis -->
  <g stroke="#C9A96E" stroke-width="2.5" fill="none">
    <circle cx="512" cy="430" r="160" stroke-opacity="0.9"/>
    <circle cx="512" cy="594" r="160" stroke-opacity="0.9"/>
  </g>

  <!-- Center anchor -->
  <circle cx="512" cy="512" r="10" fill="#C9A96E"/>

  <!-- Spine line -->
  <line x1="512" y1="172" x2="512" y2="852" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.18"/>
</svg>
